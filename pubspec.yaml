name: atlas_paragliding
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.2.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  google_fonts: ^8.0.2
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.5.5
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/hicham.png
    - assets/images/glide01.jpg
    - assets/images/glide02.jpg
    - assets/images/glide03.jpg
  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-VariableFont_wght.ttf
